<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>كلمنا — الدعم الذكي بالذكاء الاصطناعي</title>
  <meta name="description" content="كلمنا — نظام دعم العملاء الذكي المدعوم بالذكاء الاصطناعي. تحدث معنا وسنساعدك فوراً.">
  <meta property="og:title" content="كلمنا — الدعم الذكي">
  <meta property="og:description" content="نظام دعم العملاء الذكي المدعوم بالذكاء الاصطناعي">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <!-- ═══ Particle Canvas Background ═══ -->
  <canvas id="particles-canvas"></canvas>

  <!-- ═══ App Container ═══ -->
  <div class="app">

    <!-- ─── Sidebar ─── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__header">
        <div class="logo">
          <div class="logo__icon">ك</div>
          <div>
            <div class="logo__text">كلمنا</div>
            <div class="logo__subtitle">الدعم الذكي</div>
          </div>
        </div>
        <button class="sidebar__close" id="sidebar-close" aria-label="إغلاق القائمة">✕</button>
      </div>

      <div class="sidebar__content">
        <!-- New Chat Button -->
        <button class="btn-new-chat" id="btn-new-chat">
          <span>✨</span>
          <span>محادثة جديدة</span>
        </button>

        <!-- Quick Actions -->
        <div class="sidebar__label">إجراءات سريعة</div>
        <div class="quick-actions">
          <button class="quick-action-chip" data-action="track_order">
            <span class="quick-action-chip__icon">📦</span>
            <span>تتبع الطلب</span>
          </button>
          <button class="quick-action-chip" data-action="get_refund">
            <span class="quick-action-chip__icon">💰</span>
            <span>طلب استرجاع</span>
          </button>
          <button class="quick-action-chip" data-action="complaint">
            <span class="quick-action-chip__icon">📝</span>
            <span>تقديم شكوى</span>
          </button>
          <button class="quick-action-chip" data-action="delivery">
            <span class="quick-action-chip__icon">🚚</span>
            <span>خيارات التوصيل</span>
          </button>
          <button class="quick-action-chip" data-action="cancel">
            <span class="quick-action-chip__icon">❌</span>
            <span>إلغاء طلب</span>
          </button>
          <button class="quick-action-chip" data-action="contact">
            <span class="quick-action-chip__icon">📞</span>
            <span>تواصل مع الدعم</span>
          </button>
        </div>

        <!-- Chat History -->
        <div class="sidebar__label">المحادثات السابقة</div>
        <div id="chat-history">
          <div class="chat-history-item active">
            <span class="chat-history-item__icon">💬</span>
            <span class="chat-history-item__text">المحادثة الحالية</span>
          </div>
        </div>
      </div>

      <div class="sidebar__footer">
        <div style="font-size: var(--text-xs); color: var(--text-muted); text-align: center;">
          مدعوم بالذكاء الاصطناعي 🤖
        </div>
      </div>
    </aside>

    <!-- ─── Sidebar Overlay (Mobile) ─── -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- ─── Header ─── -->
    <header class="header">
      <div class="header__right">
        <button class="menu-toggle" id="menu-toggle" aria-label="فتح القائمة">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="status-indicator">
          <div class="status-dot" id="status-dot"></div>
          <span class="header__status-text">المساعد الذكي متصل</span>
        </div>
      </div>
      <div class="header__left">
        <button class="theme-toggle" id="theme-toggle" data-tooltip="تغيير السمة" aria-label="تغيير السمة">
          <span class="theme-toggle__icon">🌙</span>
        </button>
      </div>
    </header>

    <!-- ─── Main Chat Area ─── -->
    <main class="main">
      <div class="chat-area">
        <div class="chat-area__messages" id="chat-messages">
          <!-- Messages are rendered here by chat.js -->
        </div>

        <!-- ─── Welcome Screen ─── -->
        <div class="welcome" id="welcome-screen">
          <div class="welcome__icon">ك</div>
          <h1 class="welcome__title">أهلاً بك في كلمنا</h1>
          <p class="welcome__subtitle">
            أنا مساعدك الذكي لخدمة العملاء. يمكنني مساعدتك في تتبع الطلبات، الاسترجاع، الشكاوى، وأكثر. اكتب سؤالك وسأساعدك فوراً!
          </p>
          <div class="welcome__suggestions">
            <button class="welcome__chip" data-message="أريد تتبع طلبي رقم 12345">
              <span class="welcome__chip__icon">📦</span>
              <span>تتبع طلبي</span>
            </button>
            <button class="welcome__chip" data-message="أريد استرجاع المبلغ للطلب الأخير">
              <span class="welcome__chip__icon">💰</span>
              <span>طلب استرجاع</span>
            </button>
            <button class="welcome__chip" data-message="ما هي خيارات التوصيل المتاحة؟">
              <span class="welcome__chip__icon">🚚</span>
              <span>خيارات التوصيل</span>
            </button>
            <button class="welcome__chip" data-message="أريد تقديم شكوى بخصوص الخدمة">
              <span class="welcome__chip__icon">📝</span>
              <span>تقديم شكوى</span>
            </button>
            <button class="welcome__chip" data-message="أريد إلغاء طلبي">
              <span class="welcome__chip__icon">❌</span>
              <span>إلغاء طلب</span>
            </button>
            <button class="welcome__chip" data-message="أريد التحدث مع خدمة العملاء">
              <span class="welcome__chip__icon">📞</span>
              <span>تواصل مع الدعم</span>
            </button>
          </div>
        </div>
      </div>

      <!-- ─── Input Bar ─── -->
      <div class="input-bar">
        <div class="input-bar__container">
          <textarea
            class="input-bar__textarea"
            id="chat-input"
            placeholder="اكتب رسالتك هنا..."
            rows="1"
            aria-label="اكتب رسالتك"
          ></textarea>
          <button class="btn-send" id="btn-send" data-tooltip="إرسال" aria-label="إرسال الرسالة">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
        <span class="input-bar__hint">اضغط Enter للإرسال • Shift+Enter لسطر جديد</span>
      </div>
    </main>
  </div>

  <!-- JavaScript Modules -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
